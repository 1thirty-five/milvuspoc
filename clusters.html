raining data. ∗Equal contribution. Listing\u003cbr\u003eorder is random. Jakob proposed replacing RNNs with\u003cbr\u003eself-attention and started the effort to evaluate this idea.\u003cbr\u003eAshish, with Illia, designed and implemented the first\u003cbr\u003eTransformer models and has been crucially involved in every\u003cbr\u003easpect of this work. Noam proposed scaled dot-product\u003cbr\u003eattention, multi-head attention and the parameter-free\u003cbr\u003eposition representation and became the other person involved\u003cbr\u003ein nearly every detail. Niki designed, implemented, tuned\u003cbr\u003eand evaluated countless model variants in our original\u003cbr\u003ecodebase and tensor2tensor. Llion also experimented with\u003cbr\u003enovel model variants, was responsible for our initial\u003cbr\u003ecodebase, and efficient inference and visualizations. Lukasz\u003cbr\u003eand Aidan spent countless long days designing various parts\u003cbr\u003eof and implementing tensor2tensor, replacing our earlier\u003cbr\u003ecodebase, greatly improving results and massively\u003cbr\u003eaccelerating our research. †Work performed while at Google\u003cbr\u003eBrain. ‡Work performed while at Google Research. 31st\u003cbr\u003eConference on Neural Information Processing Systems (NIPS\u003cbr\u003e2017), Long Beach, CA, USA. arXiv:1706.03762v7 [cs.CL] 2 Aug\u003cbr\u003e2023","imizer We used the Adam optimizer [20] with β1 = 0.9, β2 =\u003cbr\u003e0.98 and ϵ = 10−9. We varied the learning rate over the\u003cbr\u003ecourse of training, according to the formula: lrate = d−0.5\u003cbr\u003emodel · min(step_num−0.5, step_num · warmup_steps−1.5) (3)\u003cbr\u003eThis corresponds to increasing the learning rate linearly\u003cbr\u003efor the first warmup_steps training steps, and decreasing it\u003cbr\u003ethereafter proportionally to the inverse square root of the\u003cbr\u003estep number. We used warmup_steps = 4000. 5.4 Regularization\u003cbr\u003eWe employ three types of regul LEU,\u003cbr\u003eestablishing a new state-of-the-art BLEU score of 28.4. The\u003cbr\u003econfiguration of","(Transformer (big) in Table 2) outperforms the best\u003cbr\u003epreviously reported models (including ensembles) by more\u003cbr\u003ethan 2.0 BLEU, establishing a new state-of-the-art BLEU\u003cbr\u003escore of 28.4. The configuration of this model is listed in\u003cbr\u003ethe bottom line of Table 3. Training took 3.5 days on 8 P100\u003cbr\u003eGPUs. Even our base model surpasses all previously published\u003cbr\u003emodels and ensembles, at a fraction of the training cost of\u003cbr\u003eany of the competitive models. On the WMT 2014\u003cbr\u003eEnglish-to-French translation task, our big model achieves a\u003cbr\u003eBLEU score of 41.0, outperforming all of the previously\u003cbr\u003epublished single models, at less than 1\u002f4 the training cost\u003cbr\u003eof the previous state-of-the-art model. The Transformer\u003cbr\u003e(big) model trained for English-to-French used dropout rate\u003cbr\u003ePdrop = 0.1, instead of 0.3. For the base models, we used a\u003cbr\u003esingle model obtained by averaging the last 5 checkpoints,\u003cbr\u003ewhich were written at 10-minute intervals. For the big\u003cbr\u003emodels, we averaged the last 20 checkpoints. We used beam\u003cbr\u003esearch with a beam size of 4 and length penalty α = 0.6\u003cbr\u003e[38]. These hyperparameters were chosen after\u003cbr\u003eexperimentation on the development set. We set the maximum\u003cbr\u003eoutput length during inference to input length + 50, but\u003cbr\u003eterminate early when possible [38]. Table 2 summarizes our\u003cbr\u003eresults and compares our translation quality and training\u003cbr\u003ecosts to other model architectures from the literature. We\u003cbr\u003eestimate the number of floating point operations used to\u003cbr\u003etrain a model by multiplying the training time, the number\u003cbr\u003eof GPUs used, and an estimate of the sustained\u003cbr\u003esingle-precision floating-point capacity of each GPU 5. 6.2\u003cbr\u003eModel Variations To evaluate the importance of different\u003cbr\u003ecomponents of the Transformer, we varied our","used, and an estimate of the sustained single-precision\u003cbr\u003efloating-point capacity of each GPU 5. 6.2 Model Variations\u003cbr\u003eTo evaluate the importance of different components of the\u003cbr\u003eTransformer, we varied our base model in different ways,\u003cbr\u003emeasuring the change in performance on English-to-German\u003cbr\u003etranslation on the 5We used values of 2.8, 3.7, 6.0 and 9.5\u003cbr\u003eTFLOPS for K80, K40, M40 and P100, respectively. 8","r base model in different ways, measuring the change in\u003cbr\u003eperformance on English-to-German translation on the 5We used\u003cbr\u003evalues of 2.8, 3.7, 6.0 and 9.5 TFLOPS for K80, K40, M40 and\u003cbr\u003eP100, respectively. 8 Table 3: Variations on the Transformer\u003cbr\u003earchitecture. Unlisted values are identical to those of the\u003cbr\u003ebase model. All metrics are on the English-to-German\u003cbr\u003etranslation development set, newstest2013. Listed\u003cbr\u003eperplexities are per-wordpiece, according to our byte-pair\u003cbr\u003eencoding, and should not be compared to per-word\u003cbr\u003eperplexities. N dmodel dff h dk dv Pdrop ϵls train PPL BLEU\u003cbr\u003eparams steps (dev) (dev) ×106 base 6 512 2048 8 64 64 0.1\u003cbr\u003e0.1 100K 4.92 25.8 65 (A) 1 512 512 5.29 24.9 4 128 128 5.00\u003cbr\u003e25.5 16 32 32 4.91 25.8 32 16 16 5.01 25.4 (B) 16 5.16 25.1\u003cbr\u003e58 32 5.01 25.4 60 (C) 2 6.11 23.7 36 4 5.19 25.3 50 8 4.88\u003cbr\u003e25.5 80 256 32 32 5.75 24.5 28 1024 128 128 4.66 26.0 168\u003cbr\u003e1024 5.12 25.4 53 4096 4.75 26.2 90 (D) 0.0 5.77 24.6 0.2\u003cbr\u003e4.95 25.5 0.0 4.67 25.3 0.2 5.47 25.7 (E) positional\u003cbr\u003eembedding instead of sinusoids 4.92 25.7 big 6 1024 4096 16\u003cbr\u003e0.3 300K 4.33 26.4 213 development set, newstest2013. We\u003cbr\u003eused beam search as described in the previous section, but\u003cbr\u003eno checkpoint averaging. We present these results in Table\u003cbr\u003e3. In Table 3 rows (A), we vary the number of attention\u003cbr\u003eheads and the attention key and value dimensions, keeping\u003cbr\u003ethe amount of computation constant, as described in Section\u003cbr\u003e3.2.2. While single-head attention is 0.9 BLEU worse than\u003cbr\u003ethe best setting, quality also drops off with too many\u003cbr\u003eheads. In Table 3 rows (B), we observe that reducing the\u003cbr\u003eattention key size dk hurts model quality. This suggests\u003cbr\u003ethat determining compatibility is not easy and that a more\u003cbr\u003esophisticated compatibility"],"legendgroup":"1","marker":{"color":"#EF553B","symbol":"circle","line":{"color":"white","width":0.5},"size":10},"mode":"markers","name":"1","orientation":"v","showlegend":true,"x":{"dtype":"f4","bdata":"gmYVQRQNHUH38R9BN90cQSpGIEH15RlB"},"xaxis":"x","y":{"dtype":"f4","bdata":"OmVZwOPOIsBuQzvAHB1OwH8qZ8APRXLA"},"yaxis":"y","type":"scatter"},{"hovertemplate":"\u003cb\u003e%{hovertext}\u003c\u002fb\u003e\u003cbr\u003e\u003cbr\u003ecluster=2\u003cbr\u003eUMAP-1=%{x}\u003cbr\u003eUMAP-2=%{y}\u003cextra\u003e\u003c\u002fextra\u003e","hovertext":["Provided proper attribution is provided, Google hereby\u003cbr\u003egrants permission to reproduce the tables and figures in\u003cbr\u003ethis paper solely for use in journalistic or scholarly\u003cbr\u003eworks. Attention Is All You Need Ashish Vaswani∗ Google\u003cbr\u003eBrain avaswani@google.com Noam Shazeer∗ Google Brain\u003cbr\u003enoam@google.com Niki Parmar∗ Google Research\u003cbr\u003enikip@google.com Jakob Uszkoreit∗ Google Research\u003cbr\u003eusz@google.com Llion Jones∗ Google Research llion@google.com\u003cbr\u003eAidan N. Gomez∗† University of Toronto aidan@cs.toronto.edu\u003cbr\u003eŁukasz Kaiser∗ Google Brain lukaszkaiser@google.com Illia\u003cbr\u003ePolosukhin∗‡ illia.polosukhin@gmail.com Abstract The\u003cbr\u003edominant sequence transduction models are based on complex\u003cbr\u003erecurrent or convolutional neural networks that include an\u003cbr\u003eencoder and a decoder. The best performing models also\u003cbr\u003econnect the encoder and decoder through an attention\u003cbr\u003emechanism. We propose a new simple network architecture, the\u003cbr\u003eTransformer, based solely on attention mechanisms,\u003cbr\u003edispensing with recurrence and convolutions entirely.\u003cbr\u003eExperiments on two machine translation tasks show these\u003cbr\u003emodels to be superior in quality while being more\u003cbr\u003eparallelizable and requiring significantly less time to\u003cbr\u003etrain. Our model achieves 28.4 BLEU on the WMT 2014 English-\u003cbr\u003eto-German translation task, improving over the existing best\u003cbr\u003eresults, including ensembles, by over 2 BLEU. On the WMT\u003cbr\u003e2014 English-to-French translation task, our model\u003cbr\u003eestablishes a new single-model state-of-the-art BLEU score\u003cbr\u003eof 41.8 after training for 3.5 days on eight GPUs, a","formed while at Google Brain. ‡Work performed while at\u003cbr\u003eGoogle Research. 31st Conference on Neural Information\u003cbr\u003eProcessing Systems (NIPS 2017), Long Beach, CA, USA.\u003cbr\u003earXiv:1706.03762v7 [cs.CL] 2 Aug 2023 1 Introduction\u003cbr\u003eRecurrent neural networks, long short-term memory [13] and\u003cbr\u003egated recurrent [7] neural networks in particular, have been\u003cbr\u003efirmly established as state of the art approaches in\u003cbr\u003esequence modeling and transduction problems such as language\u003cbr\u003emodeling and machine translation [35, 2, 5]. Numerous\u003cbr\u003eefforts have since continued to push the boundaries of\u003cbr\u003erecurrent language models and encoder-decoder architectures\u003cbr\u003e[38, 24, 15]. Recurrent models typically factor computation\u003cbr\u003ealong the symbol positions of the input and output\u003cbr\u003esequences. Aligning the positions to steps in computation\u003cbr\u003etime, they generate a sequence of hidden states ht, as a\u003cbr\u003efunction of the previous hidden state ht−1 and the input for\u003cbr\u003eposition t. This inherently sequential nature precludes\u003cbr\u003eparallelization within training examples, which becomes\u003cbr\u003ecritical at longer sequence lengths, as memory constraints\u003cbr\u003elimit batching across examples. Recent work has achieved\u003cbr\u003esignificant improvements in computational efficiency through\u003cbr\u003efactorization tricks [21] and conditional computation [32],\u003cbr\u003ewhile also improving model performance in case of the\u003cbr\u003elatter. The fundamental constraint of sequential\u003cbr\u003ecomputation, however, remains. Attention mechanisms have\u003cbr\u003ebecome an integral part of compelling sequence modeling and\u003cbr\u003etransduc- tion models in various tasks, allowing modeling of\u003cbr\u003edependencies without regard to their distance in the input\u003cbr\u003eor output sequences [2, 19]. In all but a few cases [27],\u003cbr\u003ehowever, such attention mechanisms are used in","various tasks, allowing modeling of dependencies without\u003cbr\u003eregard to their distance in the input or output sequences\u003cbr\u003e[2, 19]. In all but a few cases [27], however, such\u003cbr\u003eattention mechanisms are used in conjunction with a\u003cbr\u003erecurrent network. In this work we propose the Transformer,\u003cbr\u003ea model architecture eschewing recurrence and instead\u003cbr\u003erelying entirely on an attention mechanism to draw global\u003cbr\u003edependencies between input and output. The Transformer\u003cbr\u003eallows for significantly more parallelization and can reach\u003cbr\u003ea new state of the art in translation quality after being\u003cbr\u003etrained for as little as twelve hours on eight P100 GPUs. 2\u003cbr\u003eBackground The goal of reducing sequential computation also\u003cbr\u003eforms the foundation of the Extended Neural GPU [16],\u003cbr\u003eByteNet [18] and ConvS2S [9], all of which use convolutional\u003cbr\u003eneural networks as basic building block, computing hidden\u003cbr\u003erepresentations in parallel for all input and output\u003cbr\u003epositions. In these models, the number of operations\u003cbr\u003erequired to relate signals from two arbitrary input or\u003cbr\u003eoutput positions grows in the distance between positions,\u003cbr\u003elinearly for ConvS2S and logarithmically for ByteNet. This\u003cbr\u003emakes it more difficult to learn dependencies between\u003cbr\u003edistant positions [12]. In the Transformer this is reduced\u003cbr\u003eto a constant number of operations, albeit at the cost of\u003cbr\u003ereduced effective resolution due to averaging\u003cbr\u003eattention-weighted positions, an effect we counteract with\u003cbr\u003eMulti-Head Attention as described in section 3.2.\u003cbr\u003eSelf-attention, sometimes called intra-attention is an\u003cbr\u003eattention mechanism relating different positions of a single\u003cbr\u003esequence in order to compute a representation of the\u003cbr\u003esequence. Self-attention has been used successfully in a\u003cbr\u003evariety of","ra-attention is an attention mechanism relating different\u003cbr\u003epositions of a single sequence in order to compute a\u003cbr\u003erepresentation of the sequence. Self-attention has been used\u003cbr\u003esuccessfully in a variety of tasks including reading\u003cbr\u003ecomprehension, abstractive summarization, textual entailment\u003cbr\u003eand learning task-independent sentence representations [4,\u003cbr\u003e27, 28, 22]. End-to-end memory networks are based on a\u003cbr\u003erecurrent attention mechanism instead of sequence- aligned\u003cbr\u003erecurrence and have been shown to perform well on\u003cbr\u003esimple-language question answering and language modeling\u003cbr\u003etasks [34]. To the best of our knowledge, however, the\u003cbr\u003eTransformer is the first transduction model relying entirely\u003cbr\u003eon self-attention to compute representations of its input\u003cbr\u003eand output without using sequence- aligned RNNs or\u003cbr\u003econvolution. In the following sections, we will describe the\u003cbr\u003eTransformer, motivate self-attention and discuss its\u003cbr\u003eadvantages over models such as [17, 18] and [9]. 3 Model\u003cbr\u003eArchitecture Most competitive neural sequence transduction\u003cbr\u003emodels have an encoder-decoder structure [5, 2, 35]. Here,\u003cbr\u003ethe encoder maps an input sequence of symbol representations\u003cbr\u003e(x1, ..., xn) to a sequence of continuous representations z\u003cbr\u003e= (z1, ..., zn). Given z, the decoder then generates an\u003cbr\u003eoutput sequence (y1, ..., ym) of symbols one element at a\u003cbr\u003etime. At each step the model is auto-regressive [10],\u003cbr\u003econsuming the previously generated symbols as additional\u003cbr\u003einput when generating the next. 2","lly executed operations, whereas a recurrent layer requires\u003cbr\u003eO(n) sequential operations. In terms of computational\u003cbr\u003ecomplexity, self-attention layers are faster than recurrent\u003cbr\u003elayers when the sequence 6 length n is smaller than the\u003cbr\u003erepresentation dimensionality d, which is most often the\u003cbr\u003ecase with sentence representations used by state-of-the-art\u003cbr\u003emodels in machine translations, such as word-piece [38] and\u003cbr\u003ebyte-pair [31] representations. To improve computational\u003cbr\u003eperformance for tasks involving very long sequences,\u003cbr\u003eself-attention could be restricted to considering only a\u003cbr\u003eneighborhood of size r in the input sequence centered around\u003cbr\u003ethe respective output position. This would increase the\u003cbr\u003emaximum path length to O(n\u002fr). We plan to investigate this\u003cbr\u003eapproach further in future work. A single convolutional\u003cbr\u003elayer with kernel width k \u003c n does not connect all pairs of\u003cbr\u003einput and output positions. Doing so requires a stack of\u003cbr\u003eO(n\u002fk) convolutional layers in the case of contiguous\u003cbr\u003ekernels, or O(logk(n)) in the case of dilated convolutions\u003cbr\u003e[18], increasing the length of the longest paths between any\u003cbr\u003etwo positions in the network. Convolutional layers are\u003cbr\u003egenerally more expensive than recurrent layers, by a factor\u003cbr\u003eof k. Separable convolutions [6], however, decrease the\u003cbr\u003ecomplexity considerably, to O(k · n · d + n · d2). Even with\u003cbr\u003ek = n, however, the complexity of a separable convolution is\u003cbr\u003eequal to the combination of a self-attention layer and a\u003cbr\u003epoint-wise feed-forward layer, the approach we take in our\u003cbr\u003emodel. As side benefit, self-attention could yield more\u003cbr\u003einterpretable models. We inspect attention distributions\u003cbr\u003efrom our models and present and discuss examples in the\u003cbr\u003eappendix. Not only do","ke in our model. As side benefit, self-attention could yield\u003cbr\u003emore interpretable models. We inspect attention\u003cbr\u003edistributions from our models and present and discuss\u003cbr\u003eexamples in the appendix. Not only do individual attention\u003cbr\u003eheads clearly learn to perform different tasks, many appear\u003cbr\u003eto exhibit behavior related to the syntactic and semantic\u003cbr\u003estructure of the sentences. 5 Training This section\u003cbr\u003edescribes the training regime for our models. 5.1 Training\u003cbr\u003eData and Batching We trained on the standard WMT 2014\u003cbr\u003eEnglish-German dataset consisting of about 4.5 million\u003cbr\u003esentence pairs. Sentences were encoded using byte-pair\u003cbr\u003eencoding [3], which has a shared source- target vocabulary\u003cbr\u003eof about 37000 tokens. For English-French, we used the\u003cbr\u003esignificantly larger WMT 2014 English-French dataset\u003cbr\u003econsisting of 36M sentences and split tokens into a 32000\u003cbr\u003eword-piece vocabulary [38]. Sentence pairs were batched\u003cbr\u003etogether by approximate sequence length. Each training batch\u003cbr\u003econtained a set of sentence pairs containing approximately\u003cbr\u003e25000 source tokens and 25000 target tokens. 5.2 Hardware\u003cbr\u003eand Schedule We trained our models on one machine with 8\u003cbr\u003eNVIDIA P100 GPUs. For our base models using the\u003cbr\u003ehyperparameters described throughout the paper, each\u003cbr\u003etraining step took about 0.4 seconds. We trained the base\u003cbr\u003emodels for a total of 100,000 steps or 12 hours. For our big\u003cbr\u003emodels,(described on the bottom line of table 3), step time\u003cbr\u003ewas 1.0 seconds. The big models were trained for 300,000\u003cbr\u003esteps (3.5 days). 5.3 Optimizer We used the Adam optimizer\u003cbr\u003e[20] with β1 = 0.9, β2 = 0.98 and ϵ = 10−9. We varied the\u003cbr\u003elearning rate over the course of training, according to the\u003cbr\u003eformula: lrate = d−0.5 model · min(step_num−0.5,","heads. In Table 3 rows (B), we observe that reducing the\u003cbr\u003eattention key size dk hurts model quality. This suggests\u003cbr\u003ethat determining compatibility is not easy and that a more\u003cbr\u003esophisticated compatibility function than dot product may be\u003cbr\u003ebeneficial. We further observe in rows (C) and (D) that, as\u003cbr\u003eexpected, bigger models are better, and dropout is very\u003cbr\u003ehelpful in avoiding over-fitting. In row (E) we replace our\u003cbr\u003esinusoidal positional encoding with learned positional\u003cbr\u003eembeddings [9], and observe nearly identical results to the\u003cbr\u003ebase model. 6.3 English Constituency Parsing To evaluate if\u003cbr\u003ethe Transformer can generalize to other tasks we performed\u003cbr\u003eexperiments on English constituency parsing. This task\u003cbr\u003epresents specific challenges: the output is subject to\u003cbr\u003estrong structural constraints and is significantly longer\u003cbr\u003ethan the input. Furthermore, RNN sequence-to-sequence models\u003cbr\u003ehave not been able to attain state-of-the-art results in\u003cbr\u003esmall-data regimes [37]. We trained a 4-layer transformer\u003cbr\u003ewith dmodel = 1024 on the Wall Street Journal (WSJ) portion\u003cbr\u003eof the Penn Treebank [25], about 40K training sentences. We\u003cbr\u003ealso trained it in a semi-supervised setting, using the\u003cbr\u003elarger high-confidence and BerkleyParser corpora from with\u003cbr\u003eapproximately 17M sentences [37]. We used a vocabulary of\u003cbr\u003e16K tokens for the WSJ only setting and a vocabulary of 32K\u003cbr\u003etokens for the semi-supervised setting. We performed only a\u003cbr\u003esmall number of experiments to select the dropout, both\u003cbr\u003eattention and residual (section 5.4), learning rates and\u003cbr\u003ebeam size on the Section 22 development set, all other\u003cbr\u003eparameters remained unchanged from the English-to-German\u003cbr\u003ebase translation model. During inference, we 9","esidual (section 5.4), learning rates and beam size on the\u003cbr\u003eSection 22 development set, all other parameters remained\u003cbr\u003eunchanged from the English-to-German base translation model.\u003cbr\u003eDuring inference, we 9 Table 4: The Transformer generalizes\u003cbr\u003ewell to English constituency parsing (Results are on Section\u003cbr\u003e23 of WSJ) Parser Training WSJ 23 F1 Vinyals & Kaiser el al.\u003cbr\u003e(2014) [37] WSJ only, discriminative 88.3 Petrov et al.\u003cbr\u003e(2006) [29] WSJ only, discriminative 90.4 Zhu et al. (2013)\u003cbr\u003e[40] WSJ only, discriminative 90.4 Dyer et al. (2016) [8]\u003cbr\u003eWSJ only, discriminative 91.7 Transformer (4 layers) mer task our best model outperforms\u003cbr\u003eeven all previously reported ensembles. We are excited about\u003cbr\u003ethe future of attention-based models and plan to apply them\u003cbr\u003eto other tasks. We plan to extend the Transformer to\u003cbr\u003eproblems involving input and output modalities other than\u003cbr\u003etext and to investigate local, restricted attention\u003cbr\u003emechanisms to efficiently handle large inputs and outputs\u003cbr\u003esuch as images, audio and video. Making generation less\u003cbr\u003esequential is another research goals of ours. The code we\u003cbr\u003eused to train and evaluate our models is available at\u003cbr\u003ehttps:\u002f\u002fgithub.com\u002f tensorflow\u002ftensor2tensor.\u003cbr\u003eAcknowledgements We are grateful to Nal Kalchbrenner and\u003cbr\u003eStephan Gouws for their fruitful comments, corrections and\u003cbr\u003einspiration. References [1] Jimmy Lei Ba, Jamie Ryan Kiros,\u003cbr\u003eand Geoffrey E Hinton. Layer normalization. arXiv preprint\u003cbr\u003earXiv:1607.06450, 2016. [2] Dzmitry Bahdanau, Kyunghyun Cho,\u003cbr\u003eand Yoshua Bengio. Neural machine translation by jointly\u003cbr\u003elearning to align and translate. CoRR, abs\u002f1409.0473, 2014.\u003cbr\u003e[3] Denny Britz, Anna Goldie, Minh-Thang Luong, and Quoc V.\u003cbr\u003eLe. Massive exploration of neural machine translation\u003cbr\u003earchitectures. CoRR, abs\u002f1703.03906, 2017. [4] Jianpeng\u003cbr\u003eCheng, Li"],"legendgroup":"2","marker":{"color":"#00cc96","symbol":"circle","line":{"color":"white","width":0.5},"size":10},"mode":"markers","name":"2","orientation":"v","showlegend":true,"x":{"dtype":"f4","bdata":"yC0MQQO+AUF92QVBoSn9QA9r4EDwTxNB0LQRQdaYCEGZiAZB"},"xaxis":"x","y":{"dtype":"f4","bdata":"75pawPAkj8ABHjLA63hOwOBrUMBOfTXARIWAwIN9csCWHk7A"},"yaxis":"y","type":"scatter"},{"hovertemplate":"\u003cb\u003e%{hovertext}\u003c\u002fb\u003e\u003cbr\u003e\u003cbr\u003ecluster=3\u003cbr\u003eUMAP-1=%{x}\u003cbr\u00  attending to\u003cbr\u003esubsequent positions. This masking, combined with fact that\u003cbr\u003ethe output embeddings are offset by one","also modify the self-attention sub-layer in the decoder\u003cbr\u003estack to prevent positions from attending to subsequent\u003cbr\u003epositions. This masking, combined with fact that the output\u003cbr\u003eembeddings are offset by one position, ensures that the\u003cbr\u003epredictions for position i can depend only on the known\u003cbr\u003eoutputs at positions less than i. 3.2 Attention An attention\u003cbr\u003efunction can be described as mapping a query and a set of\u003cbr\u003ekey-value pairs to an output, where the query, keys, values,\u003cbr\u003eand output are all vectors. The output is computed as a\u003cbr\u003eweighted sum 3","attention function can be described as mapping a query and a\u003cbr\u003eset of key-value pairs to an output, where the query, keys,\u003cbr\u003evalues, and output are all vectors. The output is computed\u003cbr\u003eas a weighted sum 3 Scaled Dot-Product Attention Multi-Head\u003cbr\u003eAttention Figure 2: (left) Scaled Dot-Product Attention.\u003cbr\u003e(right) Multi-Head Attention consists of several attention\u003cbr\u003elayers running in parallel. of the values, where the weight\u003cbr\u003eassigned to each value is computed by a compatibility\u003cbr\u003efunction of the query with the corresponding key. 3.2.1\u003cbr\u003eScaled Dot-Product Attention We call our particular\u003cbr\u003eattention \"Scaled Dot-Product Attention\" (Figure 2). The\u003cbr\u003einput consists of queries and keys of dimension dk, and\u003cbr\u003evalues of dimension dv. We compute the dot products of the\u003cbr\u003equery with all keys, divide each by √dk, and apply a softmax\u003cbr\u003efunction to obtain the weights on the values. In practice,\u003cbr\u003ewe compute the attention function on a set of queries\u003cbr\u003esimultaneously, packed together into a matrix Q. The keys\u003cbr\u003eand values are also packed together into matrices K and V .\u003cbr\u003eWe compute the matrix of outputs as: Attention(Q, K, V ) =\u003cbr\u003esoftmax(QKT √dk )V (1) The two most commonly used attention\u003cbr\u003efunctions are additive attention [2], and dot-product\u003cbr\u003e(multi- plicative) attention. Dot-product attention is\u003cbr\u003eidentical to our algorithm, except for the scaling factor of\u003cbr\u003e1 √dk . Additive attention computes the compatibility\u003cbr\u003efunction using a feed-forward network with a single hidden\u003cbr\u003elayer. While the two are similar in theoretical complexity,\u003cbr\u003edot-product attention is much faster and more\u003cbr\u003espace-efficient in practice, since it can be implemented\u003cbr\u003eusing highly optimized matrix multiplication code. While for\u003cbr\u003esmall values of dk the two","mplexity, dot-product attention is much faster and more\u003cbr\u003espace-efficient in practice, since it can be implemented\u003cbr\u003eusing highly optimized matrix multiplication code. While for\u003cbr\u003esmall values of dk the two mechanisms perform similarly,\u003cbr\u003eadditive attention outperforms dot product attention without\u003cbr\u003escaling for larger values of dk [3]. We suspect that for\u003cbr\u003elarge values of dk, the dot products grow large in\u003cbr\u003emagnitude, pushing the softmax function into regions where\u003cbr\u003eit has extremely small gradients 4. To counteract this\u003cbr\u003eeffect, we scale the dot products by 1 √dk . 3.2.2\u003cbr\u003eMulti-Head Attention Instead of performing a single\u003cbr\u003eattention function with dmodel-dimensional keys, values and\u003cbr\u003equeries, we found it beneficial to linearly project the\u003cbr\u003equeries, keys and values h times with different, learned\u003cbr\u003elinear projections to dk, dk and dv dimensions,\u003cbr\u003erespectively. On each of these projected versions of\u003cbr\u003equeries, keys and values we then perform the attention\u003cbr\u003efunction in parallel, yielding dv-dimensional 4To illustrate\u003cbr\u003ewhy the dot products get large, assume that the components\u003cbr\u003eof q and k are independent random variables with mean 0 and\u003cbr\u003evariance 1. Then their dot product, q · k = Pdk i=1 qiki,\u003cbr\u003ehas mean 0 and variance dk. 4","e dot products get large, assume that the components of q\u003cbr\u003eand k are independent random variables with mean 0 and\u003cbr\u003evariance 1. Then their dot product, q · k = Pdk i=1 qiki,\u003cbr\u003ehas mean 0 and variance dk. 4 output values. These are\u003cbr\u003econcatenated and once again projected, resulting in the\u003cbr\u003efinal values, as depicted in Figure 2. Multi-head attention\u003cbr\u003eallows the model to jointly attend to information from\u003cbr\u003edifferent representation subspaces at different positions.\u003cbr\u003eWith a single attention head, averaging inhibits this.\u003cbr\u003eMultiHead(Q, K, V ) = Concat(head1, ..., headh)W O where\u003cbr\u003eheadi = Attention(QW Q i , KW K i , V W V i ) Where the\u003cbr\u003eprojections are parameter matrices W Q i ∈Rdmodel×dk, W K i\u003cbr\u003e∈Rdmodel×dk, W V i ∈Rdmodel×dv and W O ∈Rhdv×dmodel. In this\u003cbr\u003ework we employ h = 8 parallel attention layers, or heads.\u003cbr\u003eFor each of these we use dk = dv = dmodel\u002fh = 64. Due to the\u003cbr\u003ereduced dimension of each head, the total computational cost\u003cbr\u003eis similar to that of single-head attention with full\u003cbr\u003edimensionality. 3.2.3 Applications of Attention in our Model\u003cbr\u003eThe Transformer uses multi-head attention in three different\u003cbr\u003eways: • In \"encoder-decoder attention\" layers, the queries\u003cbr\u003ecome from the previous decoder layer, and the memory keys\u003cbr\u003eand values come from the output of the encoder. This allows\u003cbr\u003eevery position in the decoder to attend over all positions\u003cbr\u003ein the input sequence. This mimics the typical\u003cbr\u003eencoder-decoder attention mechanisms in sequence-to-sequence\u003cbr\u003emodels such as [38, 2, 9]. • The encoder contains\u003cbr\u003eself-attention layers. In a self-attention layer all of the\u003cbr\u003ekeys, values and queries come from the same place, in this\u003cbr\u003ecase, the output of the previous layer in the encoder. Each\u003cbr\u003eposition in the encoder can","ttention layers. In a self-attention layer all of the keys,\u003cbr\u003evalues and queries come from the same place, in this case,\u003cbr\u003ethe output of the previous layer in the encoder. Each\u003cbr\u003eposition in the encoder can attend to all positions in the\u003cbr\u003eprevious layer of the encoder. • Similarly, self-attention\u003cbr\u003elayers in the decoder allow each position in the decoder to\u003cbr\u003eattend to all positions in the decoder up to and including\u003cbr\u003ethat position. We need to prevent leftward information flow\u003cbr\u003ein the decoder to preserve the auto-regressive property. We\u003cbr\u003eimplement this inside of scaled dot-product attention by\u003cbr\u003emasking out (setting to −∞) all values in the input of the\u003cbr\u003esoftmax which correspond to illegal connections. See Figure\u003cbr\u003e2. 3.3 Position-wise Feed-Forward Networks In addition to\u003cbr\u003eattention sub-layers, each of the layers in our encoder and\u003cbr\u003edecoder contains a fully connected feed-forward network,\u003cbr\u003ewhich is applied to each position separately and\u003cbr\u003eidentically. This consists of two linear transformations\u003cbr\u003ewith a ReLU activation in between. FFN(x) = max(0, xW1 +\u003cbr\u003eb1)W2 + b2 (2) While the linear transformations are the same\u003cbr\u003eacross different positions, they use different parameters\u003cbr\u003efrom layer to layer. Another way of describing this is as\u003cbr\u003etwo convolutions with kernel size 1. The dimensionality of\u003cbr\u003einput and output is dmodel = 512, and the inner-layer has\u003cbr\u003edimensionality dff = 2048. 3.4 Embeddings and Softmax\u003cbr\u003eSimilarly to other sequence transduction models, we use\u003cbr\u003elearned embeddings to convert the input tokens and output\u003cbr\u003etokens to vectors of dimension dmodel. We also use the usual\u003cbr\u003elearned linear transfor- mation and softmax function to\u003cbr\u003econvert the decoder output to predicted next-token\u003cbr\u003eprobabilities. In our","and output tokens to vectors of dimension dmodel. We also\u003cbr\u003euse the usual learned linear transfor- mation and softmax\u003cbr\u003efunction to convert the decoder output to predicted\u003cbr\u003enext-token probabilities. In our model, we share the same\u003cbr\u003eweight matrix between the two embedding layers and the\u003cbr\u003epre-softmax linear transformation, similar to [30]. In the\u003cbr\u003eembedding layers, we multiply those weights by √dmodel. 5","ur model, we share the same weight matrix between the two\u003cbr\u003eembedding layers and the pre-softmax linear transformation,\u003cbr\u003esimilar to [30]. In the embedding layers, we multiply those\u003cbr\u003eweights by √dmodel. 5 Table 1: Maximum path lengths,\u003cbr\u003eper-layer complexity and minimum number of sequential\u003cbr\u003eoperations for different layer types. n is the sequence\u003cbr\u003elength, d is the representation dimension, k is the kernel\u003cbr\u003esize of convolutions and r the size of the neighborhood in\u003cbr\u003erestricted self-attention. Layer Type Complexity per Layer\u003cbr\u003eSequential Maximum Path Length Operations Self-Attention\u003cbr\u003eO(n2 · d) O(1) O(1) Recurrent O(n · d2) O(n) O(n)\u003cbr\u003eConvolutional O(k · n · d2) O(1) O(logk(n)) Self-Attention\u003cbr\u003e(restricted) O(r · n · d) O(1) O(n\u002fr) 3.5 Positional\u003cbr\u003eEncoding Since our model contains no recurrence and no\u003cbr\u003econvolution, in order for the model to make use of the order\u003cbr\u003eof the sequence, we must inject some information about the\u003cbr\u003erelative or absolute position of the tokens in the sequence.\u003cbr\u003eTo this end, we add \"positional encodings\" to the input\u003cbr\u003eembeddings at the bottoms of the encoder and decoder stacks.\u003cbr\u003eThe positional encodings have the same dimension dmodel as\u003cbr\u003ethe embeddings, so that the two can be summed. There are\u003cbr\u003emany choices of positional encodings, learned and fixed [9].\u003cbr\u003eIn this work, we use sine and cosine functions of different\u003cbr\u003efrequencies: PE(pos,2i) = sin(pos\u002f100002i\u002fdmodel)\u003cbr\u003ePE(pos,2i+1) = cos(pos\u002f100002i\u002fdmodel) where pos is the\u003cbr\u003eposition and i is the dimension. That is, each dimension of\u003cbr\u003ethe positional encoding corresponds to a sinusoid. The\u003cbr\u003ewavelengths form a geometric progression from 2π to 10000 ·\u003cbr\u003e2π. We chose this function because we hypothesized it would\u003cbr\u003eallow the model to easily learn","sitional encoding corresponds to a sinusoid. The wavelengths\u003cbr\u003eform a geometric progression from 2π to 10000 · 2π. We chose\u003cbr\u003ethis function because we hypothesized it would allow the\u003cbr\u003emodel to easily learn to attend by relative positions, since\u003cbr\u003efor any fixed offset k, PEpos+k can be represented as a\u003cbr\u003elinear function of PEpos. We also experimented with using\u003cbr\u003elearned positional embeddings [9] instead, and found that\u003cbr\u003ethe two versions produced nearly identical results (see\u003cbr\u003eTable 3 row (E)). We chose the sinusoidal version because it\u003cbr\u003emay allow the model to extrapolate to sequence lengths\u003cbr\u003elonger than the ones encountered during training. 4 Why\u003cbr\u003eSelf-Attention In this section we compare various aspects of\u003cbr\u003eself-attention layers to the recurrent and convolu- tional\u003cbr\u003elayers commonly used for mapping one variable-length\u003cbr\u003esequence of symbol representations (x1, ..., xn) to another\u003cbr\u003esequence of equal length (z1, ..., zn), with xi, zi ∈Rd,\u003cbr\u003esuch as a hidden layer in a typical sequence transduction\u003cbr\u003eencoder or decoder. Motivating our use of self-attention we\u003cbr\u003econsider three desiderata. One is the total computational\u003cbr\u003ecomplexity per layer. Another is the amount of computation\u003cbr\u003ethat can be parallelized, as measured by the minimum number\u003cbr\u003eof sequential operations required. The third is the path\u003cbr\u003elength between long-range dependencies in the network.\u003cbr\u003eLearning long-range dependencies is a key challenge in many\u003cbr\u003esequence transduction tasks. One key factor affecting the\u003cbr\u003eability to learn such dependencies is the length of the\u003cbr\u003epaths forward and backward signals have to traverse in the\u003cbr\u003enetwork. The shorter these paths between any combination of\u003cbr\u003epositions in the input and output sequences, the easier it\u003cbr\u003eis to learn","gth of the paths forward and backward signals have to\u003cbr\u003etraverse in the network. The shorter these paths between any\u003cbr\u003ecombination of positions in the input and output sequences,\u003cbr\u003ethe easier it is to learn long-range dependencies [12].\u003cbr\u003eHence we also compare the maximum path length between any\u003cbr\u003etwo input and output positions in networks composed of the\u003cbr\u003edifferent layer types. As noted in Table 1, a self-attention\u003cbr\u003elayer connects all positions with a constant number of\u003cbr\u003esequentially executed operations, whereas a recurrent layer\u003cbr\u003erequires O(n) sequential operations. In terms of\u003cbr\u003ecomputational complexity, self-attention layers are faster\u003cbr\u003ethan recurrent layers when the sequen
